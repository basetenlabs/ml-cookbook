<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>training-explorer</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- Top: run header + stat strip -->
  <div class="run-header">
    <div>
      <div class="run-id" id="run-id">—</div>
      <div class="run-meta" id="run-meta"></div>
    </div>
    <div>
      <button id="theme-toggle" title="Toggle dark mode">◐</button>
    </div>
  </div>

  <div class="stat-strip" id="stat-strip"></div>

  <!-- PRIMARY: Rollouts -->
  <div class="section rollouts-section" id="rollouts-section">
    <div class="section-header">
      <div class="section-title">Rollouts</div>
      <div class="section-meta" id="rollouts-meta"></div>
    </div>

    <!-- Source tabs (only shown if >1 source) -->
    <div class="source-tabs" id="source-tabs"></div>

    <!-- Filter bar (step + group filters when available) -->
    <div class="filter-bar" id="filter-bar"></div>

    <!-- The actual rollout display — group grid or flat list -->
    <div id="rollout-display"></div>

    <!-- Pagination, when applicable -->
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- SECONDARY: Metrics -->
  <div class="section section-collapsible" id="metrics-section">
    <div class="section-header" onclick="toggleSection('metrics-section')">
      <div class="section-title">Metrics</div>
      <div class="section-meta" id="metrics-meta"></div>
    </div>
    <div class="section-body">
      <div class="chart-grid" id="chart-grid"></div>
    </div>
  </div>

  <!-- SECONDARY: Config -->
  <div class="section section-collapsible collapsed" id="config-section">
    <div class="section-header" onclick="toggleSection('config-section')">
      <div class="section-title">Config</div>
      <div class="section-meta" id="config-meta"></div>
    </div>
    <div class="section-body">
      <div class="config-table" id="config-table"></div>
    </div>
  </div>

  <!-- FOOTER: detection details (collapsed) -->
  <div class="detection-footer">
    <details>
      <summary>Detection details</summary>
      <div id="detection-body"></div>
    </details>
  </div>

  <!-- Side panel for rollout detail view -->
  <div class="side-panel" id="side-panel">
    <div class="side-panel-header">
      <div class="side-panel-title" id="side-panel-title">—</div>
      <button class="side-panel-close" onclick="closePanel()">×</button>
    </div>
    <div class="side-panel-body">
      <div id="panel-loader" class="panel-loader" aria-hidden="true">
        <div class="panel-loader-spinner"></div>
      </div>
      <iframe id="side-panel-iframe" src="about:blank" onload="onPanelLoad()"></iframe>
    </div>
  </div>

  <script src="/renderers.js"></script>
  <script>
    // Bootstrap: fetch /data, render the page.
    let RUN = null;
    let activeSourceIdx = 0;
    let activeFilters = {step: null, group: null};
    let activePage = 0;
    const PAGE_SIZE = 50;

    // --- theme toggle ---
    const themeBtn = document.getElementById('theme-toggle');
    const savedTheme = document.cookie.match(/te-theme=(\w+)/);
    if (savedTheme) document.documentElement.dataset.theme = savedTheme[1];
    themeBtn.addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      document.cookie = `te-theme=${next}; path=/; max-age=31536000`;
    });

    // --- collapsible sections ---
    function toggleSection(id) {
      document.getElementById(id).classList.toggle('collapsed');
    }

    // --- side panel ---
    function openPanel(sourceIdx, rolloutId, title) {
      const panel = document.getElementById('side-panel');
      document.getElementById('side-panel-title').textContent = title || rolloutId || '—';
      document.getElementById('panel-loader').classList.add('active');
      document.getElementById('side-panel-iframe').src =
        `/detail/${encodeURIComponent(sourceIdx)}/${encodeURIComponent(rolloutId)}`;
      panel.classList.add('open');
    }
    function onPanelLoad() {
      // Hide spinner once the iframe content has fully loaded
      const iframe = document.getElementById('side-panel-iframe');
      if (iframe.src === 'about:blank') return; // closing, ignore
      document.getElementById('panel-loader').classList.remove('active');
    }
    function closePanel() {
      document.getElementById('side-panel').classList.remove('open');
      document.getElementById('panel-loader').classList.remove('active');
      setTimeout(() => {
        document.getElementById('side-panel-iframe').src = 'about:blank';
      }, 200);
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

    // --- main render ---
    async function loadAndRender() {
      const r = await fetch('/data');
      RUN = await r.json();
      renderHeader();
      renderStatStrip();
      renderRollouts();
      renderMetrics();
      renderConfig();
      renderDetectionFooter();
    }

    // Auto-refresh every 5s. Render functions are idempotent + don't reset scroll.
    loadAndRender();
    setInterval(loadAndRender, 5000);
  </script>
</body>
</html>
