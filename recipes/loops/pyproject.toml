[project]
name = "loops-cookbook"
version = "0.1.0"
description = "Starter training recipes for the Baseten Loops SDK"
requires-python = ">=3.13"
dependencies = [
    "tinker-cookbook[math-rl]",
    "baseten-loops>=0.5.0",
    "baseten-loops-tinker>=0.4.0",
    "chz",
    "wandb>=0.16.0",
]

[tool.uv]
# tinker-cookbook depends on tinker, but the tinker namespace is provided by
# baseten-loops-tinker (a drop-in shim backed by the loops SDK). This override
# prevents the original tinker package from ever being installed.
override-dependencies = [
    "tinker ; python_version < '0'",
]
